function log(msg, type='') {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += `<div class="${type}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

// studentId 생성: class_name (예: 5-1_최세아)
function makeId(s) {
  return `${s.class}_${s.name}`;
}

async function runSetup() {
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.textContent = '등록 중...';

  log('▶ 학생 DB 등록 시작', 'info');
  log(`총 ${STUDENTS.length}명 처리 예정`);

  let success = 0, skipped = 0, failed = 0;

  for (const s of STUDENTS) {
    const id = makeId(s);
    try {
      const ref = db.collection('students').doc(id);
      const snap = await ref.get();
      if (snap.exists) {
        log(`⏭ 스킵 (이미 존재): ${s.class} ${s.name}`);
        skipped++;
      } else {
        await ref.set({
          id,
          name: s.name,
          grade: s.grade,
          class: s.class,
          teacher: s.teacher,
          school: s.school,
          active: true,
          isNewcomer: false,
          createdAt: new Date().toISOString(),
          attendanceHistory: {},   // { "2026-04-28": "present" }
          attendanceSummary: {     // 연간 요약
            totalPresent: 0,
            totalAbsent: 0,
            totalSundays: 0,
          }
        });
        log(`✓ 등록: ${s.class} ${s.name}`, 'ok');
        success++;
      }
    } catch(e) {
      log(`✗ 실패: ${s.class} ${s.name} — ${e.message}`, 'err');
      failed++;
    }
  }

  // 반 목록 메타 저장
  try {
    const classes = {};
    STUDENTS.forEach(s => {
      if (!classes[s.class]) classes[s.class] = { id: s.class, grade: s.grade, teacher: s.teacher, students: [] };
      classes[s.class].students.push(makeId(s));
    });
    await db.collection('meta').doc('classes').set({ data: Object.values(classes), updatedAt: new Date().toISOString() });
    log('✓ 반 목록 메타 저장 완료', 'ok');
  } catch(e) {
    log('✗ 반 목록 메타 저장 실패: ' + e.message, 'err');
  }

  log('', '');
  log(`━━━━━━━━━━━━━━━━━━━━━━━━━━━━`, 'info');
  log(`✅ 완료 — 등록 ${success}명 / 스킵 ${skipped}명 / 실패 ${failed}명`, 'info');
  log(`이제 이 페이지는 닫아도 됩니다.`, '');

  btn.textContent = '완료!';
}
